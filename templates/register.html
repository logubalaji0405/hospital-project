{% extends 'base.html' %}
{% block title %}Register{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8">
            <div class="login-card">
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-primary">Register</h2>
                    <p class="text-muted mb-0">Create your Healix HMS account</p>
                </div>

                <form method="POST">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Username</label>
                        <input type="text" name="username" class="form-control custom-input" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Email</label>
                        <input type="email" name="email" class="form-control custom-input" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Password</label>
                        <input type="password" name="password" class="form-control custom-input" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Role</label>
                        <select name="role" class="form-control custom-input" required>
                            <option value="patient">Patient</option>
                            <option value="doctor">Doctor</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 login-btn mt-3">
                        Send OTP
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
    .login-card {
        background: #ffffff;
        border-radius: 24px;
        box-shadow: 0 10px 35px rgba(13, 110, 253, 0.12);
        padding: 40px 32px;
        border: 1px solid #e9f2ff;
    }
    .custom-input {
        height: 50px;
        border-radius: 14px;
        border: 1px solid #d8e6ff;
        padding: 10px 14px;
        box-shadow: none;
    }
    .custom-input:focus {
        border-color: #0d6efd;
        box-shadow: 0 0 0 0.15rem rgba(13, 110, 253, 0.15);
    }
    .login-btn {
        height: 52px;
        border-radius: 14px;
        font-weight: 700;
        font-size: 1rem;
    }
</style>
{% endblock %}
