{% extends 'base.html' %}
{% block title %}Chat{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="box">
                <h3 class="mb-4">Chat with {{ receiver.first_name|default:receiver.username }}</h3>

                <div style="height:350px;overflow-y:auto;border:1px solid #ddd;border-radius:10px;padding:15px;background:#f8f9fa;">
                    {% for msg in messages_list %}
                        <div class="mb-3 {% if msg.sender == user %}text-end{% endif %}">
                            <div class="d-inline-block px-3 py-2 rounded {% if msg.sender == user %}bg-primary text-white{% else %}bg-light border{% endif %}">
                                <strong>{{ msg.sender.username }}</strong><br>
                                {{ msg.message }}
                            </div>
                        </div>
                    {% empty %}
                        <p>No messages yet</p>
                    {% endfor %}
                </div>

                <form method="POST" class="mt-3">
                    {% csrf_token %}
                    <div class="input-group">
                        <input type="text" name="message" class="form-control" placeholder="Type your message..." required>
                        <button class="btn btn-primary" type="submit">Send</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
