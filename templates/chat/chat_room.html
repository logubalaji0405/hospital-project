{% extends 'base.html' %}
{% block title %}Live Chat{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="chat-wrapper shadow-lg rounded-4 overflow-hidden">
        <div class="chat-header d-flex justify-content-between align-items-center px-4 py-3">
            <div>
                <h5 class="mb-0 fw-bold">{{ other_user.get_full_name|default:other_user.username }}</h5>
                <small class="opacity-75">Live Chat</small>
            </div>
            <a href="{% url 'my_chats' %}" class="btn btn-light btn-sm rounded-pill px-3">Back</a>
        </div>

        <div id="chat-box" class="chat-box"></div>

        <div class="chat-footer p-3">
            <form id="chat-form" class="d-flex gap-2">
                {% csrf_token %}
                <input type="text" id="message-input" class="form-control rounded-pill px-4" placeholder="Type your message..." autocomplete="off">
                <button type="submit" class="btn btn-primary rounded-pill px-4">Send</button>
            </form>
        </div>
    </div>
</div>

<style>
.chat-wrapper{max-width:900px;margin:auto;background:#fff;border:1px solid #e9eefb;}
.chat-header{background:linear-gradient(135deg,#0d6efd,#0b57d0);color:white;}
.chat-box{height:500px;overflow-y:auto;padding:20px;background:#f6f9ff;display:flex;flex-direction:column;gap:12px;}
.msg-row{display:flex;}
.msg-row.me{justify-content:flex-end;}
.msg-row.other{justify-content:flex-start;}
.msg-bubble{max-width:72%;padding:12px 16px;border-radius:18px;box-shadow:0 4px 14px rgba(0,0,0,0.08);word-wrap:break-word;}
.msg-row.me .msg-bubble{background:linear-gradient(135deg,#0d6efd,#3b82f6);color:white;border-bottom-right-radius:6px;}
.msg-row.other .msg-bubble{background:white;color:#1e293b;border-bottom-left-radius:6px;border:1px solid #e2e8f0;}
.msg-time{font-size:12px;margin-top:6px;opacity:0.75;}
.chat-footer{background:white;border-top:1px solid #e5e7eb;}
</style>

<script>
const messagesUrl = "{% url 'get_messages' room.id %}";
const sendUrl = "{% url 'send_message' room.id %}";
const chatBox = document.getElementById("chat-box");
const chatForm = document.getElementById("chat-form");
const messageInput = document.getElementById("message-input");
let lastSnapshot = "";

function scrollToBottom() {
    chatBox.scrollTop = chatBox.scrollHeight;
}

function escapeHtml(text) {
    const div = document.createElement("div");
    div.innerText = text;
    return div.innerHTML;
}

function renderMessages(messages) {
    const snapshot = JSON.stringify(messages);
    if (snapshot === lastSnapshot) return;
    lastSnapshot = snapshot;

    chatBox.innerHTML = "";

    messages.forEach(msg => {
        const row = document.createElement("div");
        row.className = `msg-row ${msg.is_me ? 'me' : 'other'}`;

        const bubble = document.createElement("div");
        bubble.className = "msg-bubble";
        bubble.innerHTML = `
            <div>${escapeHtml(msg.message)}</div>
            <div class="msg-time">${msg.timestamp}</div>
        `;

        row.appendChild(bubble);
        chatBox.appendChild(row);
    });

    scrollToBottom();
}

async function loadMessages() {
    try {
        const response = await fetch(messagesUrl);
        const data = await response.json();
        if (data.messages) renderMessages(data.messages);
    } catch (error) {
        console.log("Load messages error:", error);
    }
}

chatForm.addEventListener("submit", async function(e) {
    e.preventDefault();

    const message = messageInput.value.trim();
    if (!message) return;

    const formData = new FormData();
    formData.append("message", message);
    formData.append("csrfmiddlewaretoken", document.querySelector('[name=csrfmiddlewaretoken]').value);

    try {
        const response = await fetch(sendUrl, {
            method: "POST",
            body: formData
        });

        const data = await response.json();
        if (data.success) {
            messageInput.value = "";
            loadMessages();
        }
    } catch (error) {
        console.log("Send message error:", error);
    }
});

loadMessages();
setInterval(loadMessages, 1000);
</script>
{% endblock %}
